function share(){if(navigator.share)navigator.share({title:'\u4e86\u89e3\u4f60\u7684\u5185\u5fc3 \xb7 \u6291\u90c1\u75c7\u6d4b\u8bc4',text:'32\u9898\u4e13\u4e1a\u6d4b\u8bc4\uff0c\u6709\u6e29\u5ea6\u5730\u4e86\u89e3\u81ea\u5df1\u7684\u5fc3\u7406\u72b6\u6001',url:location.href});else{navigator.clipboard.writeText(location.href);alert('\u94fe\u63a5\u5df2\u590d\u5236\uff0c\u53ef\u5206\u4eab\u7ed9\u9700\u8981\u7684\u670b\u53cb \ud83d\udc9b');}}
</script>
